<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="css/styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat - Kokoa Clone</title>
  </head>
  <body id="chat-screen">
    <div class="status-bar">
      <div class="status-bar_colum">
        <span>No Service</span>
        <i class="fa-solid fa-wifi"></i>
      </div>
      <div class="status-bar_colum">
        <span>15:46</span>
      </div>
      <div class="status-bar_colum">
        <span>100%</span>
        <i class="fa-solid fa-battery-full"></i>
        <i class="fa-solid fa-bolt"></i>
      </div>
    </div>

    <header class="alt-header">
      <div class="alt-header_column">
        <a href="chats.html"><i class="fa-solid fa-chevron-left fa-2x"></i></a>
      </div>
      <div class="alt-header_column">
        <h1 class="alt-header_title">Name</h1>
      </div>
      <div class="alt-header_column">
        <span><i class="fa-brands fa-sistrix fa-2x"></i></span>
        <span><i class="fa-solid fa-bars fa-2x"></i></span>
      </div>
    </header>

    <main class="main-screen main-chat">
      <div class="chat_timestamp">Saturday, March 14, 2026</div>

      <div class="message-row">
        <img src="https://avatars.githubusercontent.com/u/197471766?s=48&v=4" />
        <div class="message-row_content">
          <span class="message-author">Name</span>
          <div class="message_info">
            <span class="message-bubble">Hi!</span>
            <span class="message-time">23:01</span>
          </div>
        </div>
      </div>

      <div class="message-row message-row-own">
        <div class="message-row_content">
          <div class="message_info">
            <span class="message-bubble">What's up?</span>
            <span class="message-time">23:01</span>
          </div>
        </div>
      </div>
    </main>

    <form class="reply">
      <div class="reply_column">
        <i class="fa-regular fa-square-plus fa-lg"></i>
      </div>
      <div class="reply_column">
        <input type="text" placeholder="Write a message..." />
        <i class="fa-regular fa-face-smile fa-lg"></i>
        <button>
          <i class="fa-solid fa-arrow-up"></i>
        </button>
      </div>
    </form>

    <div id="no-mobile">
      <span>Your screen is to big</span>
    </div>

    <script
      src="https://kit.fontawesome.com/03f1e57859.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
